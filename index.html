<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Ubah meta title ini agar preview di WhatsApp sesuai -->
    <meta name="title" content="Happy Birthday Sadut! 🎂"> 
    <meta name="description" content="A special birthday gift for you!">
    <title>BIRTHDAY SADUT</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <style>
        /* === STYLE UNTUK LAYAR SAMBUTAN === */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--color-pink, #fff0f3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            transition: opacity 1s ease, visibility 1s ease;
        }

        #welcome-screen h2 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--color-text-pink, #d90429);
            margin-bottom: 30px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        #open-btn {
            background-color: var(--color-text-pink, #d90429);
            color: white;
            border: 3px solid var(--color-black, #333);
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: "Sriracha", cursive;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 6px 15px rgba(217, 4, 41, 0.4);
            transition: transform 0.2s, background-color 0.3s;
            animation: pulse-btn 2s infinite;
        }

        @keyframes pulse-btn {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Saat dihilangkan */
        #welcome-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
    </style>
</head>

<body>
    <!-- LAYAR SAMBUTAN AWAL -->
    <div id="welcome-screen">
        <h2>A Special Gift For You... 🎁</h2>
        <button id="open-btn">Open Me!</button>
    </div>

    <div id="wrapper">
        <div class="flag__birthday">
            <img src="./images/1.png" alt="" width="350" class="flag__left">
            <img src="./images/1.png" alt="" width="350" class="flag__right">
        </div>
        <div class="content">
            <div class="left">
                <div class="title">
                    <h1 class="happy">
                        <span style="--t: 4s;">H</span>
                        <span style="--t: 4.2s;">a</span>
                        <span style="--t: 4.4s;">p</span>
                        <span style="--t: 4.6s;">p</span>
                        <span style="--t: 4.8s;">y</span>
                    </h1>
                    <h1 class="birthday">
                        <span style="--t: 5s;">B</span>
                        <span style="--t: 5.2s;">i</span>
                        <span style="--t: 5.4s;">r</span>
                        <span style="--t: 5.6s;">t</span>
                        <span style="--t: 5.8s;">h</span>
                        <span style="--t: 6s;">d</span>
                        <span style="--t: 6.2s;">a</span>
                        <span style="--t: 6.4s;">y</span>
                    </h1>
                    <div class="hat">
                        <img src="./images/hat.png" alt="" width="130">
                    </div>
                </div>
                <div class="date__of__birth">
                    <span></span>
                </div>
                <div class="btn">
                    <a href="cake.html" style="text-decoration: none;">
                        <button type="button" style="margin-top: 30px; background-color: var(--color-text-pink); outline: none; padding: 10px 25px; font-size: 1.1rem; border-radius: 50px; border: 3px solid var(--color-black); font-family: 'Sriracha', cursive; cursor: pointer; color: var(--color-black); display: flex; align-items: center; gap: 10px; box-shadow: 0px 4px 8px rgba(0,0,0,0.2); transition: transform 0.2s;">
                            Let's Cut the Cake! 🎂
                        </button>
                    </a>
                </div>
            </div>
            <div class="right">
                <div class="box__account">
                    <div class="image">
                        <img src="./images/sadut.png" alt="">
                    </div>
                    <div class="name">
                        <i class="fa-solid fa-heart"></i>
                        <span>I'm Turning 24 yeay :D</span>
                        <i class="fa-solid fa-heart"></i>
                    </div>
                    <div class="balloon_one">
                        <img width="100px" src="./images/balloon1.png" alt="">
                    </div>
                    <div class="balloon_two">
                        <img width="100px" src="./images/balloon2.png" alt="">
                    </div>
                </div>
                <div class="cricle">
                    <div class="text__cricle">
                        <span style="--i: 1;">h</span>
                        <span style="--i: 2;">a</span>
                        <span style="--i: 3;">p</span>
                        <span style="--i: 4;">p</span>
                        <span style="--i: 5;">y</span>
                        <span style="--i: 6;">-</span>
                        <span style="--i: 7;">b</span>
                        <span style="--i: 8;">i</span>
                        <span style="--i: 9;">r</span>
                        <span style="--i: 10;">t</span>
                        <span style="--i: 11;">h</span>
                        <span style="--i: 12;">d</span>
                        <span style="--i: 13;">a</span>
                        <span style="--i: 14;">y</span>
                        <span style="--i: 15;">-</span>
                    </div>
                    <i class="fa-solid fa-heart"></i>
                </div>
            </div>
        </div>
        <div class="decorate_star star1" style="--t: 15s;"></div>
        <div class="decorate_star star2" style="--t: 15.2s;"></div>
        <div class="decorate_star star3" style="--t: 15.4s;"></div>
        <div class="decorate_star star4" style="--t: 15.6s;"></div>
        <div class="decorate_star star5" style="--t: 15.8s;"></div>
        <div class="decorate_flower--one" style="--t: 15s;">
            <img width="20" src="./images/decorate_flower.png" alt="">
        </div>
        <div class="decorate_flower--two" style="--t: 15.3s;">
            <img width="20" src="./images/decorate_flower.png" alt="">
        </div>
        <div class="decorate_flower--three" style="--t: 15.6s;">
            <img width="20" src="./images/decorate_flower.png" alt="">
        </div>
        <div class="decorate_bottom">
            <img src="./images/decorate.png" alt="" width="100">
        </div>
        <div class="smiley__icon">
            <img src="./images/smiley_icon.png" alt="" width="100">
        </div>
    </div>

    <!-- AUDIO -->
    <audio id="bg-music" loop>
        <!-- PAStIKAN NAMANYA BENAR aud.mp3 ATAU song.mp3 -->
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script>
        // FUNGSI UNTUK TOMBOL AWAL (MENGAKALI AUTOPLAY BROWSER)
        const welcomeScreen = document.getElementById('welcome-screen');
        const openBtn = document.getElementById('open-btn');
        const audio = document.getElementById('bg-music');

        openBtn.addEventListener('click', function() {
            // 1. Putar lagu
            audio.play();
            // 2. Hilangkan layar sambutan
            welcomeScreen.classList.add('hidden');
            
            // Note: Animasi tanggal, balon, dsb akan jalan sendiri
            // Karena CSS animation-delay nya terus berjalan.
        });

        // SISA SCRIPT INDEX.HTML LAMA
        let datetxt = "08 April 2002";
        // ... (sisanya tetap sama)
        let datatxtletter = "My love. You are a very special girl. I always silently thank you for coming into my life. Today, I wish you all the best, lots of health, and lots of joy. I always hope we will celebrate many more birthdays like this together. Happy birthday to you.💕";
        let titleLetter = "To you";
        let charArrDate = datetxt.split('');
        let charArrDateLetter = datatxtletter.split('');
        let charArrTitle = titleLetter.split('');
        let currentIndex = 0;
        let currentIndexLetter = 0;
        let currentIndexTitle = 0;
        let date__of__birth = document.querySelector(".date__of__birth span");
        let text__letter = document.querySelector(".text__letter p");
        setTimeout(function () {
            timeDatetxt = setInterval(function () {
                if (currentIndex < charArrDate.length) {
                    date__of__birth.textContent += charArrDate[currentIndex];
                    currentIndex++;
                }
                else {
                    let i = document.createElement("i");
                    i.className = "fa-solid fa-star"
                    document.querySelector(".date__of__birth").prepend(i)
                    document.querySelector(".date__of__birth").appendChild(i.cloneNode(true))
                    clearInterval(timeDatetxt)
                }
            }, 100)
        }, 12000)
    </script>
</body>
</html>
